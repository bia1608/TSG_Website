<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h1>TSG</h1>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email"
               type="email"
               formControlName="email"
               placeholder="email@student.ro"
               [class.invalid]="email.invalid && email.touched" />
        @if (email.invalid && email.touched) {
        <span class="error-msg">Email invalid.</span>
        }
      </div>
      <div class="field">
        <label for="password">Parolă</label>
        <input id="password"
               type="password"
               formControlName="password"
               placeholder="••••••••"
               [class.invalid]="password.invalid && password.touched" />
        @if (password.invalid && password.touched) {
        <span class="error-msg">Parola trebuie să aibă minim 6 caractere.</span>
        }
      </div>
      <!-- Eroare de la backend (401 etc.) -->
      @if (error) {
      <div class="server-error">{{ error }}</div>
      }

      <!-- Buton submit -->
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Se încarcă...' : 'Autentifică-te' }}
      </button>
    </form>
    <p class="register-link">
      Nu ai cont? <a routerLink="/register">Înregistrează-te</a>
    </p>
  </div>
</div>
