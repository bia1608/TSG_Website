<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="nav-logo">TSG</a>

    <ul class="nav-links" [class.open]="menuOpen">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Acasă</a></li>
      <li><a routerLink="/about" routerLinkActive="active">Despre</a></li>
      <li><a routerLink="/blog" routerLinkActive="active">Blog</a></li>

      @if (auth.isLoggedIn()) {
      <li class="divider"></li>
      @if (auth.isAdmin()) {
      <li><a routerLink="/admin" routerLinkActive="active" class="link-admin">⚙️ Admin</a></li>
      }
      <li><a routerLink="/dashboard" routerLinkActive="active">{{ auth.currentUser()?.firstName }}</a></li>
      <li><button class="btn-logout" (click)="logout()">Ieși</button></li>
      } @else {
      <li><a routerLink="/login" class="btn-login" routerLinkActive="active">Login</a></li>
      }
    </ul>

    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

@if (menuOpen) {
<div class="overlay" (click)="toggleMenu()"></div>
}
